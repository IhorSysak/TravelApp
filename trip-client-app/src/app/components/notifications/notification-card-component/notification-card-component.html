<div class="notification-item" [class.unread]="!notification().isRead">
    <div class="notification-content">
        <p class="notification-message">{{ notification().message }}</p>
            <span class="notification-time">
                {{ notification().createdAt | date: 'MMM d, h:mm a' }}
            </span>
    </div>

    <div class="notification-actions">
        @if (!notification().isRead) {
            <button type="button" class="btn-icon" title="Mark as read" (click)="markAsReadClick.emit(notification().id)"> ✓ </button>
        }
        <button type="button" class="btn-icon btn-icon--danger" title="Remove" (click)="removeClick.emit(notification().id)"> ✕ </button>
    </div>
</div>
