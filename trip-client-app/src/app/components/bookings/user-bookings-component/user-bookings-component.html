<div class="user-bookings-container">
    <div class="bookings-header">
    <h1>Bookings</h1>
  </div>

  @if (error()) {
    <div class="alert alert-error">
      <span>{{ error() }}</span>
    </div>
  }

  @if (isLoading()) {
    <div class="loading">
      <p>Loading your bookings...</p>
    </div>
  } @else {

    <app-filter-bar-component
          (filterChanged)="handleFilterChange($event)"/>
    
    @if (displayedBookings().length === 0) {
      <div class="empty-state">
        <p>You don't have any bookings yet.</p>
      </div>
    } @else {
        <div class="trips-list">
          @for (booking of displayedBookings(); track booking.id) {
            <app-booking-card-component
              [booking]="booking"
              [mode]="UserRole.USER"
              (cancelClick)="cancelBooking($event)" />
          }
        </div>

        <app-pagination-component
          [currentPage]="pagination.currentPage()"
          [totalPages]="pagination.totalPages()"
          [hasPreviousPage]="pagination.hasPreviousPage()"
          [hasNextPage]="pagination.hasNextPage()"
          (previousPageClick)="previousPage()"
          (nextPageClick)="nextPage()" />
    }
  }
</div>
